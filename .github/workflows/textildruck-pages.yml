name: Textildruck-Waren canlı önizleme
# Public depo etkinleştirildikten sonra yeniden yayınlandı.
on:
  push:
    branches: [main]
    paths:
      - "projects/textildruck-waren/**"
      - ".github/workflows/textildruck-pages.yml"
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu al
        uses: actions/checkout@v4
      - name: Pages yapılandır
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Site dosyalarını yükle
        uses: actions/upload-pages-artifact@v3
        with:
          path: projects/textildruck-waren
      - name: Yayınla
        id: deployment
        uses: actions/deploy-pages@v4
